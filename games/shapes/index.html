<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>かたち・いろあそび</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      padding: 60px 16px 40px;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }

    /* 戻るボタン */
    #back-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 20px; padding: 7px 16px; font-size: 0.8rem;
      text-decoration: none; z-index: 10; touch-action: manipulation;
    }

    /* 問題エリア */
    #question-area {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
    }

    #hint-text {
      font-size: 1.4rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.05em;
    }

    #shape-display {
      width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
      animation: none;
    }
    #shape-display.wrong {
      animation: shake 0.4s ease;
    }
    #shape-display.correct {
      animation: popCorrect 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-14px); }
      40%      { transform: translateX(14px); }
      60%      { transform: translateX(-10px); }
      80%      { transform: translateX(10px); }
    }
    @keyframes popCorrect {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.3); }
      100% { transform: scale(0) translateY(-60px); opacity: 0; }
    }

    #shape-display svg { width: 160px; height: 160px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5)); }

    /* 回答ボックスエリア */
    #bins {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    .bin {
      aspect-ratio: 1;
      border-radius: 20px;
      border: 4px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, border-color 0.1s;
      box-shadow: 0 6px 0 rgba(0,0,0,0.35);
      font-size: 2rem;
    }
    .bin:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.35); }
    .bin.flash-correct { animation: flashGreen 0.4s ease; }
    @keyframes flashGreen {
      0%,100% { border-color: rgba(255,255,255,0.2); }
      50%      { border-color: #fff; box-shadow: 0 0 24px rgba(255,255,255,0.8); }
    }

    /* お祝いオーバーレイ */
    #celebration {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      z-index: 30; pointer-events: none;
    }
    #celebration.show { display: flex; }
    .celebration-text { font-size: 5rem; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .star-burst { position: absolute; font-size: 2.4rem; animation: starFloat 1.4s ease-out forwards; }
    @keyframes starFloat {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.4); }
    }

    /* スコア表示 */
    #score {
      position: fixed; top: 14px; right: 14px;
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <a id="back-btn" href="../../index.html">← もどる</a>
  <div id="score"></div>

  <div id="question-area">
    <div id="hint-text">どのいろかな？</div>
    <div id="shape-display"></div>
  </div>

  <div id="bins"></div>

  <div id="celebration"></div>

  <script src="../../shared/audio.js"></script>
  <script>
    // ---- データ定義 ----
    const COLORS = [
      { id: 'red',    label: 'あか', hex: '#f44336', dark: '#b71c1c' },
      { id: 'blue',   label: 'あお', hex: '#2196f3', dark: '#0d47a1' },
      { id: 'yellow', label: 'きいろ', hex: '#ffeb3b', dark: '#f9a825' },
      { id: 'green',  label: 'みどり', hex: '#4caf50', dark: '#1b5e20' },
    ];

    const SHAPES = [
      {
        id: 'circle',
        label: 'まる',
        svg: (color) => `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="${color}"/></svg>`,
      },
      {
        id: 'square',
        label: 'しかく',
        svg: (color) => `<svg viewBox="0 0 100 100"><rect x="8" y="8" width="84" height="84" rx="10" fill="${color}"/></svg>`,
      },
      {
        id: 'triangle',
        label: 'さんかく',
        svg: (color) => `<svg viewBox="0 0 100 100"><polygon points="50,6 96,94 4,94" fill="${color}"/></svg>`,
      },
      {
        id: 'star',
        label: 'ほし',
        svg: (color) => {
          const pts = [];
          for (let i = 0; i < 10; i++) {
            const r = i % 2 === 0 ? 46 : 20;
            const a = (Math.PI / 5) * i - Math.PI / 2;
            pts.push(`${50 + r * Math.cos(a)},${50 + r * Math.sin(a)}`);
          }
          return `<svg viewBox="0 0 100 100"><polygon points="${pts.join(' ')}" fill="${color}"/></svg>`;
        },
      },
    ];

    // ---- 問題キュー生成（全色×全形 = 16問） ----
    function buildQueue() {
      const q = [];
      SHAPES.forEach(shape => COLORS.forEach(color => q.push({ shape, color })));
      // シャッフル
      for (let i = q.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [q[i], q[j]] = [q[j], q[i]];
      }
      return q;
    }

    let queue = buildQueue();
    let qIdx  = 0;
    let current = null;
    let locked  = false;

    // ---- UI構築 ----
    const binsEl       = document.getElementById('bins');
    const shapeDisplay = document.getElementById('shape-display');
    const hintText     = document.getElementById('hint-text');
    const scoreEl      = document.getElementById('score');
    const celebrationEl= document.getElementById('celebration');

    // ボックスを4色分生成
    COLORS.forEach(color => {
      const bin = document.createElement('div');
      bin.className = 'bin';
      bin.style.background = color.hex;
      bin.style.boxShadow  = `0 6px 0 ${color.dark}`;
      bin.dataset.colorId  = color.id;
      bin.textContent      = color.label;

      const onTap = (e) => { e.preventDefault(); if (!locked) handleAnswer(color.id, bin); };
      bin.addEventListener('touchstart', onTap, { passive: false });
      bin.addEventListener('mousedown',  onTap);
      binsEl.appendChild(bin);
    });

    function updateScore() {
      scoreEl.textContent = `${qIdx} / ${queue.length}`;
    }

    function showQuestion() {
      current = queue[qIdx];
      shapeDisplay.innerHTML = current.shape.svg(current.color.hex);
      hintText.textContent   = `この ${current.shape.label} は？`;
      shapeDisplay.className = 'shape-display'; // アニメリセット
      updateScore();
    }

    function handleAnswer(colorId, binEl) {
      if (!current) return;
      locked = true;

      if (colorId === current.color.id) {
        // 正解
        playNote(659.25, 0.2);
        setTimeout(() => playNote(783.99, 0.2), 150);
        binEl.classList.add('flash-correct');
        setTimeout(() => binEl.classList.remove('flash-correct'), 400);

        shapeDisplay.style.animation = 'none';
        shapeDisplay.offsetHeight; // reflow
        shapeDisplay.style.animation = 'popCorrect 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards';

        qIdx++;
        updateScore();

        if (qIdx >= queue.length) {
          setTimeout(() => { showCelebration(); queue = buildQueue(); qIdx = 0; }, 500);
          setTimeout(() => showQuestion(), 2800);
        } else {
          setTimeout(() => { shapeDisplay.style.animation = ''; showQuestion(); }, 500);
        }

      } else {
        // 不正解
        playNote(200, 0.3, 'sawtooth');
        shapeDisplay.style.animation = 'none';
        shapeDisplay.offsetHeight;
        shapeDisplay.style.animation = 'shake 0.4s ease';
        setTimeout(() => { shapeDisplay.style.animation = ''; locked = false; }, 450);
        return;
      }

      setTimeout(() => { locked = false; }, 600);
    }

    function showCelebration() {
      celebrationEl.innerHTML = '';
      celebrationEl.classList.add('show');
      const txt = document.createElement('div');
      txt.className = 'celebration-text';
      txt.textContent = '🎉';
      celebrationEl.appendChild(txt);
      const stars = ['⭐','🌟','✨','💫','🎊','🎶','🌈','❤️'];
      for (let i = 0; i < 18; i++) {
        const s = document.createElement('div');
        s.className = 'star-burst';
        s.textContent = stars[i % stars.length];
        const angle = (i / 18) * 360, dist = 130 + Math.random() * 90;
        s.style.setProperty('--tx', Math.round(Math.cos(angle * Math.PI / 180) * dist) + 'px');
        s.style.setProperty('--ty', Math.round(Math.sin(angle * Math.PI / 180) * dist) + 'px');
        s.style.left = '50%'; s.style.top = '50%';
        s.style.marginLeft = '-20px'; s.style.marginTop = '-20px';
        s.style.animationDelay = (Math.random() * 0.2) + 's';
        celebrationEl.appendChild(s);
      }
      playCelebration();
      setTimeout(() => { celebrationEl.classList.remove('show'); celebrationEl.innerHTML = ''; }, 2200);
    }

    showQuestion();
  </script>
</body>
</html>
