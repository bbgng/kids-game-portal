<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>かずあそび</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(160deg, #FFF9E6 0%, #FFF0CC 100%);
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
    }

    /* Back */
    #back-btn {
      position: fixed;
      top: 16px; left: 16px;
      z-index: 20;
      background: rgba(255,255,255,0.85);
      border: none; border-radius: 50%;
      width: 46px; height: 46px;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ── Stage ── */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 70px 16px 16px;
      gap: 12px;
      overflow: hidden;
    }

    /* Big number */
    #big-number {
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
      color: #FF6B35;
      text-shadow: 4px 5px 0 #FFB347, 7px 7px 0 rgba(0,0,0,0.08);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes numPop {
      0%  { transform: scale(0.5) rotate(-8deg); }
      65% { transform: scale(1.18) rotate(3deg); }
      100%{ transform: scale(1)   rotate(0deg); }
    }
    #big-number.pop { animation: numPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }

    /* Reading */
    #reading {
      font-size: 24px;
      font-weight: bold;
      color: #999;
      letter-spacing: 0.08em;
      min-height: 30px;
    }

    /* Animal parade runway */
    #runway {
      width: 100%;
      max-width: 500px;
      min-height: 110px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 8px;
      position: relative;
    }

    .animal {
      font-size: 58px;
      line-height: 1;
      display: inline-block;
      animation: runIn var(--dur) cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: var(--delay);
    }
    /* shrink when many */
    .animal.sm { font-size: 44px; }
    .animal.xs { font-size: 36px; }

    @keyframes runIn {
      from {
        transform: translateX(160px) scaleX(-1);
        opacity: 0;
      }
      70% {
        transform: translateX(-8px) scaleX(-1);
        opacity: 1;
      }
      to {
        transform: translateX(0) scaleX(1);
        opacity: 1;
      }
    }

    /* ── Number strip ── */
    #num-strip {
      background: rgba(255,255,255,0.92);
      border-top: 2px solid rgba(255,200,100,0.35);
      padding: 12px 10px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .num-btn {
      width: 54px;
      height: 64px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(160deg, #FFD54F, #FFB300);
      font-size: 28px;
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,0.18);
      cursor: pointer;
      box-shadow: 0 5px 0 #E65100, 0 7px 14px rgba(0,0,0,0.15);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .num-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #E65100, 0 2px 6px rgba(0,0,0,0.12);
    }
    .num-btn.active {
      background: linear-gradient(160deg, #FF7043, #E64A19);
      box-shadow: 0 5px 0 #BF360C, 0 7px 14px rgba(0,0,0,0.2);
    }
    .num-btn[data-n="10"] { font-size: 20px; }

    /* Confetti */
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      font-size: 30px;
      top: -40px;
      animation: confettiFall var(--dur2) ease-out forwards;
    }
    @keyframes confettiFall {
      from { opacity: 1; transform: translate(0,0) rotate(0deg); }
      to   { opacity: 0; transform: translate(var(--dx), 100vh) rotate(var(--rot)); }
    }
  </style>
</head>
<body>

<button id="back-btn" onclick="location.href='../../index.html'">←</button>

<div id="stage">
  <div id="big-number"></div>
  <div id="reading"></div>
  <div id="runway"></div>
</div>

<div id="num-strip">
  <button class="num-btn" data-n="1"  onclick="showNumber(1)">1</button>
  <button class="num-btn" data-n="2"  onclick="showNumber(2)">2</button>
  <button class="num-btn" data-n="3"  onclick="showNumber(3)">3</button>
  <button class="num-btn" data-n="4"  onclick="showNumber(4)">4</button>
  <button class="num-btn" data-n="5"  onclick="showNumber(5)">5</button>
  <button class="num-btn" data-n="6"  onclick="showNumber(6)">6</button>
  <button class="num-btn" data-n="7"  onclick="showNumber(7)">7</button>
  <button class="num-btn" data-n="8"  onclick="showNumber(8)">8</button>
  <button class="num-btn" data-n="9"  onclick="showNumber(9)">9</button>
  <button class="num-btn" data-n="10" onclick="showNumber(10)">10</button>
</div>

<script>
// ── Audio ────────────────────────────────────────────────
let _ctx = null;
function getAudio() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playNote(freq, dur = 0.35, type = 'triangle', vol = 0.5) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
}
const SCALE = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25];
function playCelebration() {
  [523.25,659.25,783.99,1046.50].forEach((f,i) =>
    setTimeout(() => playNote(f, 0.38, 'triangle', 0.45), i * 110));
}

// ── Creature pool ────────────────────────────────────────
// Dinos listed multiple times → higher frequency
const POOL = [
  // 🦕🦖 dinos × 4 each
  '🦕','🦕','🦕','🦕',
  '🦖','🦖','🦖','🦖',
  // reptiles / prehistoric feel
  '🐊','🦎','🐢',
  // big animals
  '🐘','🦁','🐯','🐼','🦊','🐺','🦒','🦏','🦛',
  // birds
  '🐧','🦅','🦜','🐦','🦆','🦢',
  // bugs
  '🐛','🦋','🐝','🐞','🦗','🪲','🐜',
  // sea / other
  '🐬','🦀','🦑',
];

function pickRandom() {
  return POOL[Math.floor(Math.random() * POOL.length)];
}

// ── Readings ─────────────────────────────────────────────
const READINGS = ['いち','に','さん','し','ご','ろく','しち','はち','きゅう','じゅう'];

// ── Main ─────────────────────────────────────────────────
function showNumber(n) {
  // Button highlight
  document.querySelectorAll('.num-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.n === n));

  // Big number
  const numEl = document.getElementById('big-number');
  numEl.textContent = n;
  numEl.classList.remove('pop');
  void numEl.offsetWidth;
  numEl.classList.add('pop');

  // Reading
  document.getElementById('reading').textContent = READINGS[n - 1];

  // Sound: nth scale note
  playNote(SCALE[n - 1], 0.4);

  // Pick ONE animal for this round
  const animal = pickRandom();

  // Size class
  const sizeClass = n >= 9 ? 'xs' : n >= 6 ? 'sm' : '';

  // Build runway
  const runway = document.getElementById('runway');
  runway.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const span = document.createElement('span');
    span.className = 'animal' + (sizeClass ? ' ' + sizeClass : '');
    span.textContent = animal;
    // stagger each one arriving from the right
    const delay = i * 90;
    span.style.setProperty('--delay', delay + 'ms');
    span.style.setProperty('--dur', '0.55s');
    runway.appendChild(span);
  }

  // Celebration on 10
  if (n === 10) {
    setTimeout(playCelebration, n * 90 + 100);
    setTimeout(spawnConfetti, n * 90 + 200);
  }
}

function spawnConfetti() {
  const items = ['🎉','⭐','🌟','✨','🎈','💫','🎊','🦕','🦖'];
  for (let i = 0; i < 16; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = items[Math.floor(Math.random() * items.length)];
      el.style.left = (5 + Math.random() * 90) + 'vw';
      el.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
      el.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      el.style.setProperty('--dur2', (0.9 + Math.random() * 0.7) + 's');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }, i * 55);
  }
}

// Start
showNumber(1);
</script>
</body>
</html>
