<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>かずあそび</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(160deg, #FFF9E6 0%, #FFF0CC 100%);
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
    }

    #back-btn {
      position: fixed;
      top: 16px; left: 16px;
      z-index: 20;
      background: rgba(255,255,255,0.85);
      border: none; border-radius: 50%;
      width: 46px; height: 46px;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ── Stage ── */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px 16px 8px;
      gap: 0;
      overflow: hidden;
    }

    /* Number */
    #big-number {
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      color: #FF6B35;
      text-shadow: 3px 4px 0 #FFB347, 5px 5px 0 rgba(0,0,0,0.08);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
    }
    @keyframes numPop {
      0%  { transform: scale(0.5) rotate(-8deg); }
      65% { transform: scale(1.2) rotate(3deg); }
      100%{ transform: scale(1)   rotate(0deg); }
    }
    #big-number.pop { animation: numPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }

    /* ── Runway ── */
    #runway-wrap {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Each animal is absolutely positioned and animates across the full width */
    .animal {
      position: absolute;
      font-size: 80px;
      line-height: 1;
      /* vertical position set per item in JS */
      /* horizontal animation: right-edge in → cross screen → left-edge out */
      animation: march var(--speed) linear both;
      animation-delay: var(--delay);
      white-space: nowrap;
    }

    @keyframes march {
      from { transform: translateX(110vw); }
      to   { transform: translateX(-15vw); }
    }

    /* ── Number strip ── */
    #num-strip {
      background: rgba(255,255,255,0.92);
      border-top: 2px solid rgba(255,200,100,0.35);
      padding: 12px 10px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .num-btn {
      width: 54px;
      height: 64px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(160deg, #FFD54F, #FFB300);
      font-size: 28px;
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,0.18);
      cursor: pointer;
      box-shadow: 0 5px 0 #E65100, 0 7px 14px rgba(0,0,0,0.15);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .num-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #E65100, 0 2px 6px rgba(0,0,0,0.12);
    }
    .num-btn.active {
      background: linear-gradient(160deg, #FF7043, #E64A19);
      box-shadow: 0 5px 0 #BF360C, 0 7px 14px rgba(0,0,0,0.2);
    }
    .num-btn[data-n="10"] { font-size: 20px; }

    /* Confetti */
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      font-size: 30px;
      top: -40px;
      animation: confettiFall var(--dur2) ease-out forwards;
    }
    @keyframes rainFall {
      from { transform: translateY(0) rotate(var(--r, 0deg)); opacity: 1; }
      80%  { opacity: 1; }
      to   { transform: translateY(110vh) rotate(var(--r, 0deg)); opacity: 0; }
    }
    @keyframes confettiFall {
      from { opacity: 1; transform: translate(0,0) rotate(0deg); }
      to   { opacity: 0; transform: translate(var(--dx), 100vh) rotate(var(--rot)); }
    }
  </style>
</head>
<body>

<button id="back-btn" onclick="location.href='../../index.html'">←</button>

<div id="stage">
  <div id="big-number"></div>
  <div id="runway-wrap"></div>
</div>

<div id="num-strip">
  <button class="num-btn" data-n="1"  onclick="showNumber(1)">1</button>
  <button class="num-btn" data-n="2"  onclick="showNumber(2)">2</button>
  <button class="num-btn" data-n="3"  onclick="showNumber(3)">3</button>
  <button class="num-btn" data-n="4"  onclick="showNumber(4)">4</button>
  <button class="num-btn" data-n="5"  onclick="showNumber(5)">5</button>
  <button class="num-btn" data-n="6"  onclick="showNumber(6)">6</button>
  <button class="num-btn" data-n="7"  onclick="showNumber(7)">7</button>
  <button class="num-btn" data-n="8"  onclick="showNumber(8)">8</button>
  <button class="num-btn" data-n="9"  onclick="showNumber(9)">9</button>
  <button class="num-btn" data-n="10" onclick="showNumber(10)">10</button>
</div>

<script>
// ── Audio ────────────────────────────────────────────────
let _ctx = null;
function getAudio() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playNote(freq, dur = 0.35, type = 'triangle', vol = 0.5) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
}
const SCALE = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25];
function playCelebration() {
  [523.25,659.25,783.99,1046.50].forEach((f,i) =>
    setTimeout(() => playNote(f, 0.38, 'triangle', 0.45), i * 110));
}

// ── Creature pool (dinos weighted 4×) ───────────────────
const POOL = [
  '🦕','🦕','🦕','🦕',
  '🦖','🦖','🦖','🦖',
  '🐊','🦎','🐢',
  '🐘','🦁','🐯','🐼','🦊','🐺','🦒','🦏','🦛',
  '🐧','🦅','🦜','🐦','🦆','🦢',
  '🐞',
  '🐬','🐋','🦓','🦘','🐆','🦍',
];

function pickRandom() {
  return POOL[Math.floor(Math.random() * POOL.length)];
}

// ── Main ─────────────────────────────────────────────────
function showNumber(n) {
  document.querySelectorAll('.num-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.n === n));

  // Number pop
  const numEl = document.getElementById('big-number');
  numEl.textContent = n;
  numEl.classList.remove('pop');
  void numEl.offsetWidth;
  numEl.classList.add('pop');

  // Sound
  playNote(SCALE[n - 1], 0.4);

  // One animal type for this run
  const animal = pickRandom();

  // Layout: divide runway height into rows based on count
  const wrap = document.getElementById('runway-wrap');
  wrap.innerHTML = '';

  const wrapH = wrap.clientHeight || 300;

  // Place each animal on a horizontal "lane"
  // For n items, divide the height into n lanes, one animal per lane
  // Stagger delay so they march in one after another from the right
  const MARCH_DURATION = 4.4; // seconds to cross screen
  const STAGGER = 0.35;       // seconds between each animal

  for (let i = 0; i < n; i++) {
    const span = document.createElement('span');
    span.className = 'animal';
    span.textContent = animal;

    // vertical: evenly distribute across runway height
    const laneH = wrapH / n;
    const top = laneH * i + laneH * 0.5 - 50; // center in lane (emoji ~80px)
    span.style.top = Math.max(0, top) + 'px';

    span.style.setProperty('--delay', (i * STAGGER) + 's');
    span.style.setProperty('--speed', MARCH_DURATION + 's');

    wrap.appendChild(span);
  }

  // 10 → celebrate after all have entered
  if (n === 10) {
    const celebDelay = (n * STAGGER + 0.5) * 1000;
    setTimeout(playCelebration, celebDelay);
    setTimeout(spawnConfetti, celebDelay + 100);
  }
}

function spawnConfetti() {
  const items = ['🎉','⭐','🌟','✨','🎈','💫','🎊','🦕','🦖'];
  for (let i = 0; i < 16; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = items[Math.floor(Math.random() * items.length)];
      el.style.left = (5 + Math.random() * 90) + 'vw';
      el.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
      el.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      el.style.setProperty('--dur2', (0.9 + Math.random() * 0.7) + 's');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }, i * 55);
  }
}

showNumber(1);

// ── 隠しコマンド: 3連続タップで動物の雨 ────────────────
let tapCount = 0;
let tapTimer = null;

document.getElementById('stage').addEventListener('pointerdown', () => {
  tapCount++;
  clearTimeout(tapTimer);
  if (tapCount >= 3) {
    tapCount = 0;
    animalRain();
  } else {
    tapTimer = setTimeout(() => { tapCount = 0; }, 600);
  }
});

function animalRain() {
  const count = 90 + Math.floor(Math.random() * 20); // 90〜109匹
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.textContent = POOL[Math.floor(Math.random() * POOL.length)];
      el.style.cssText = `
        position: fixed;
        top: -60px;
        left: ${Math.random() * 100}vw;
        font-size: ${64 + Math.random() * 52}px;
        pointer-events: none;
        z-index: 200;
        animation: rainFall ${1.8 + Math.random() * 2}s linear forwards;
        transform: rotate(${Math.random() * 40 - 20}deg);
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }, i * 35);
  }
}
</script>
</body>
</html>
