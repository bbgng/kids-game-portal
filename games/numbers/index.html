<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>かずあそび</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #FFF8E1 0%, #FFF3E0 100%);
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
    }

    /* Back */
    #back-btn {
      position: fixed;
      top: 14px; left: 14px;
      z-index: 20;
      background: rgba(255,255,255,0.8);
      border: none; border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* Stage */
    #stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 16px 16px;
    }

    /* Big number display */
    #big-number {
      font-size: 96px;
      font-weight: 900;
      line-height: 1;
      color: #FF6B35;
      text-shadow: 4px 4px 0 #FFB347, 6px 6px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
      margin-bottom: 8px;
      min-height: 110px;
      display: flex;
      align-items: center;
    }
    #big-number.pop {
      animation: numPop 0.3s ease-out;
    }
    @keyframes numPop {
      0%  { transform: scale(0.6); }
      60% { transform: scale(1.2); }
      100%{ transform: scale(1); }
    }

    /* Reading label */
    #reading {
      font-size: 22px;
      font-weight: bold;
      color: #888;
      margin-bottom: 20px;
      min-height: 28px;
      letter-spacing: 0.05em;
    }

    /* Character grid */
    #char-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      max-width: 480px;
      min-height: 160px;
    }

    .char-item {
      font-size: 52px;
      line-height: 1;
      animation: charPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes charPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    /* Number strip */
    #num-strip {
      background: rgba(255,255,255,0.9);
      border-top: 2px solid rgba(255,200,100,0.4);
      padding: 10px 8px 14px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .num-btn {
      width: 52px;
      height: 62px;
      border-radius: 16px;
      border: 3px solid transparent;
      background: linear-gradient(145deg, #FFE082, #FFB300);
      font-size: 26px;
      font-weight: 900;
      color: white;
      text-shadow: 1px 2px 0 rgba(0,0,0,0.2);
      cursor: pointer;
      box-shadow: 0 4px 0 #E65100, 0 6px 12px rgba(0,0,0,0.15);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .num-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #E65100, 0 2px 6px rgba(0,0,0,0.15);
    }
    .num-btn.active {
      background: linear-gradient(145deg, #FF7043, #E64A19);
      box-shadow: 0 4px 0 #BF360C, 0 6px 12px rgba(0,0,0,0.2);
      border-color: rgba(255,255,255,0.4);
      transform: scale(1.1);
    }
    .num-btn.active:active {
      transform: scale(1.1) translateY(3px);
    }

    /* Celebration */
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      font-size: 28px;
      animation: confettiFall 1.2s ease-out forwards;
    }
    @keyframes confettiFall {
      from { opacity: 1; transform: translate(0,0) rotate(0deg); }
      to   { opacity: 0; transform: translate(var(--dx), 80vh) rotate(var(--rot)); }
    }
  </style>
</head>
<body>

<button id="back-btn" onclick="location.href='../../index.html'">←</button>

<div id="stage">
  <div id="big-number"></div>
  <div id="reading"></div>
  <div id="char-grid"></div>
</div>

<div id="num-strip">
  <button class="num-btn" data-n="1"  onclick="showNumber(1)">1</button>
  <button class="num-btn" data-n="2"  onclick="showNumber(2)">2</button>
  <button class="num-btn" data-n="3"  onclick="showNumber(3)">3</button>
  <button class="num-btn" data-n="4"  onclick="showNumber(4)">4</button>
  <button class="num-btn" data-n="5"  onclick="showNumber(5)">5</button>
  <button class="num-btn" data-n="6"  onclick="showNumber(6)">6</button>
  <button class="num-btn" data-n="7"  onclick="showNumber(7)">7</button>
  <button class="num-btn" data-n="8"  onclick="showNumber(8)">8</button>
  <button class="num-btn" data-n="9"  onclick="showNumber(9)">9</button>
  <button class="num-btn" data-n="10" onclick="showNumber(10)" style="font-size:20px">10</button>
</div>

<script>
// ── Web Audio ──────────────────────────────────────────────
let _ctx = null;
function getAudio() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playNote(freq, dur = 0.3, type = 'triangle', vol = 0.5) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + dur);
}

// Scale: C D E F G A B C D E (do re mi fa so ra si do re mi)
const SCALE_FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25];

function playCelebration() {
  const freqs = [523.25, 659.25, 783.99, 1046.50];
  freqs.forEach((f, i) => {
    setTimeout(() => playNote(f, 0.35, 'triangle', 0.45), i * 100);
  });
}

// ── Data ──────────────────────────────────────────────────
const READINGS = ['いち','に','さん','し','ご','ろく','しち','はち','きゅう','じゅう'];

// Sets of themed characters (rotate through them)
const CHAR_SETS = [
  ['🐱','🐶','🐰','🐻','🐼','🐨','🦊','🐯','🐸','🐷'],
  ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🍉','🍌','🍍'],
  ['⭐','🌙','☀️','🌈','❄️','💧','🌸','🍀','🦋','🌺'],
  ['🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒','🚚'],
  ['🦁','🐘','🦒','🐬','🦅','🐢','🦄','🐙','🦋','🐝'],
];

let currentSet = 0;
let currentNum = null;

function pickSet(n) {
  // On 10, celebrate and cycle to next set
  if (n === 10) {
    currentSet = (currentSet + 1) % CHAR_SETS.length;
  }
  return CHAR_SETS[currentSet];
}

// ── Main ──────────────────────────────────────────────────
function showNumber(n) {
  currentNum = n;

  // Button highlight
  document.querySelectorAll('.num-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.n) === n);
  });

  // Big number pop
  const numEl = document.getElementById('big-number');
  numEl.textContent = n;
  numEl.classList.remove('pop');
  void numEl.offsetWidth;
  numEl.classList.add('pop');

  // Reading
  document.getElementById('reading').textContent = READINGS[n - 1];

  // Play the nth note of scale
  playNote(SCALE_FREQS[n - 1], 0.4, 'triangle', 0.5);

  // Characters
  const chars = CHAR_SETS[currentSet];
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';

  for (let i = 0; i < n; i++) {
    const span = document.createElement('span');
    span.className = 'char-item';
    span.textContent = chars[i % chars.length];
    span.style.animationDelay = (i * 60) + 'ms';
    // shrink emoji when many
    if (n >= 8) span.style.fontSize = '42px';
    grid.appendChild(span);
  }

  // Special celebration on 10
  if (n === 10) {
    setTimeout(playCelebration, 300);
    setTimeout(spawnConfetti, 400);
    setTimeout(() => { currentSet = (currentSet + 1) % CHAR_SETS.length; }, 1200);
  }
}

function spawnConfetti() {
  const items = ['🎉','⭐','🌟','✨','🎈','💫','🎊'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = items[Math.floor(Math.random() * items.length)];
      el.style.left = (5 + Math.random() * 90) + 'vw';
      el.style.top  = '-40px';
      el.style.setProperty('--dx', (Math.random() * 100 - 50) + 'px');
      el.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      el.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1800);
    }, i * 60);
  }
}

// Start with 1
showNumber(1);
</script>
</body>
</html>
