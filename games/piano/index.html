<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>おんがくタッチ楽器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e; min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden; touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }
    #song-select { position: fixed; top: 14px; right: 14px; display: flex; gap: 8px; z-index: 10; }
    #song-select button {
      background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 20px; padding: 7px 16px; font-size: 0.8rem;
      cursor: pointer; touch-action: manipulation; transition: background 0.2s;
    }
    #song-select button.active { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.7); }
    #back-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 20px; padding: 7px 16px; font-size: 0.8rem;
      text-decoration: none; z-index: 10; touch-action: manipulation;
    }
    #keyboard { display: flex; gap: 10px; padding: 0 16px; width: 100%; max-width: 760px; height: 72vh; height: 72dvh; align-items: stretch; }
    .key {
      flex: 1; border-radius: 18px; cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 10px 0 rgba(0,0,0,0.4);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .key.pressed { transform: translateY(8px) scale(0.97); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
    .key:nth-child(1) { background: #f44336; }
    .key:nth-child(2) { background: #ff9800; }
    .key:nth-child(3) { background: #ffeb3b; }
    .key:nth-child(4) { background: #4caf50; }
    .key:nth-child(5) { background: #2196f3; }
    .key:nth-child(6) { background: #9c27b0; }
    .key:nth-child(7) { background: #e91e63; }
    .key:nth-child(8) { background: #00bcd4; }
    #effects { position: fixed; inset: 0; pointer-events: none; z-index: 20; }
    .effect-particle { position: absolute; font-size: 2.2rem; animation: floatUp 0.95s ease-out forwards; pointer-events: none; }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-130px) scale(1.5) rotate(30deg); }
    }
    #celebration { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 30; pointer-events: none; }
    #celebration.show { display: flex; }
    .celebration-text { font-size: 5rem; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .star-burst { position: absolute; font-size: 2.4rem; animation: starFloat 1.4s ease-out forwards; }
    @keyframes starFloat {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.4); }
    }
  </style>
</head>
<body>
  <a id="back-btn" href="../../index.html">← もどる</a>
  <div id="song-select">
    <button class="active" data-song="twinkle">きらきら星</button>
    <button data-song="butterfly">ちょうちょ</button>
    <button data-song="doremifa">ドレミのうた</button>
  </div>
  <div id="keyboard"></div>
  <div id="effects"></div>
  <div id="celebration"></div>
  <script src="../../shared/audio.js"></script>
  <script>
    const NOTE = {
      C4:261.63, D4:293.66, E4:329.63, F4:349.23,
      G4:392.00, A4:440.00, B4:493.88,
      C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99,
    };
    const SONGS = {
      // きらきら星（変わらず正しい）
      twinkle: [
        NOTE.C4,NOTE.C4,NOTE.G4,NOTE.G4,NOTE.A4,NOTE.A4,NOTE.G4,
        NOTE.F4,NOTE.F4,NOTE.E4,NOTE.E4,NOTE.D4,NOTE.D4,NOTE.C4,
        NOTE.G4,NOTE.G4,NOTE.F4,NOTE.F4,NOTE.E4,NOTE.E4,NOTE.D4,
        NOTE.G4,NOTE.G4,NOTE.F4,NOTE.F4,NOTE.E4,NOTE.E4,NOTE.D4,
        NOTE.C4,NOTE.C4,NOTE.G4,NOTE.G4,NOTE.A4,NOTE.A4,NOTE.G4,
        NOTE.F4,NOTE.F4,NOTE.E4,NOTE.E4,NOTE.D4,NOTE.D4,NOTE.C4,
      ],
      // ちょうちょ（A部＋B部 完全版）
      // A: ソミミ ファレレ ドレミファ ソソソ × 2（2回目末はドミソド）
      // B: ラララ ラファファ ミファソファ ミミミ / レレレレ ミファレ ドミソソ ド
      butterfly: [
        // A部1
        NOTE.G4,NOTE.E4,NOTE.E4,
        NOTE.F4,NOTE.D4,NOTE.D4,
        NOTE.C4,NOTE.D4,NOTE.E4,NOTE.F4,
        NOTE.G4,NOTE.G4,NOTE.G4,
        // A部2
        NOTE.G4,NOTE.E4,NOTE.E4,
        NOTE.F4,NOTE.D4,NOTE.D4,
        NOTE.C4,NOTE.E4,NOTE.G4,NOTE.G4,
        NOTE.C4,
        // B部1
        NOTE.A4,NOTE.A4,NOTE.A4,
        NOTE.A4,NOTE.F4,NOTE.F4,
        NOTE.E4,NOTE.F4,NOTE.G4,NOTE.F4,
        NOTE.E4,NOTE.E4,NOTE.E4,
        // B部2
        NOTE.D4,NOTE.D4,NOTE.D4,NOTE.D4,
        NOTE.E4,NOTE.F4,NOTE.D4,
        NOTE.C4,NOTE.E4,NOTE.G4,NOTE.G4,
        NOTE.C4,
      ],
      // ドレミのうた（ドレミファソラシド → 降りて → サビ）
      // 上り: ドレミファソラシド
      // 下り: ドシラソファミレド
      // サビ: ソミドレ ファラソ / ミソミド レファシド
      doremifa: [
        // 上り
        NOTE.C4,NOTE.D4,NOTE.E4,NOTE.F4,NOTE.G4,NOTE.A4,NOTE.B4,NOTE.C5,
        // 下り
        NOTE.C5,NOTE.B4,NOTE.A4,NOTE.G4,NOTE.F4,NOTE.E4,NOTE.D4,NOTE.C4,
        // サビ前半: ソ ミ ド レ / ファ ラ ソ
        NOTE.G4,NOTE.E4,NOTE.C4,NOTE.D4,
        NOTE.F4,NOTE.A4,NOTE.G4,
        // サビ後半: ミ ソ ミ ド / レ ファ シ ド
        NOTE.E4,NOTE.G4,NOTE.E4,NOTE.C4,
        NOTE.D4,NOTE.F4,NOTE.B4,NOTE.C5,
      ],
    };
    let currentSong = 'twinkle', noteIndex = 0;
    const keyboard = document.getElementById('keyboard');
    const PARTICLES = ['🎵','⭐','✨','🌟','💫','🎶','🎊','🌈'];
    for (let i = 0; i < 8; i++) {
      const key = document.createElement('div');
      key.className = 'key';
      keyboard.appendChild(key);
      const onPress = (e) => {
        e.preventDefault();
        const r = key.getBoundingClientRect();
        handleTap(key, { x: r.left + r.width / 2, y: r.top + r.height * 0.3 });
      };
      key.addEventListener('touchstart', onPress, { passive: false });
      key.addEventListener('mousedown', onPress);
    }
    function handleTap(keyEl, pos) {
      playNote(SONGS[currentSong][noteIndex]);
      noteIndex = (noteIndex + 1) % SONGS[currentSong].length;
      keyEl.classList.add('pressed');
      setTimeout(() => keyEl.classList.remove('pressed'), 150);
      spawnParticle(pos);
      if (noteIndex === 0) showCelebration();
    }
    const effectsEl = document.getElementById('effects');
    function spawnParticle({ x, y }) {
      const p = document.createElement('div');
      p.className = 'effect-particle';
      p.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
      p.style.left = (x - 18) + 'px';
      p.style.top  = (y - 18) + 'px';
      effectsEl.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }
    const celebrationEl = document.getElementById('celebration');
    function showCelebration() {
      celebrationEl.innerHTML = '';
      celebrationEl.classList.add('show');
      const txt = document.createElement('div');
      txt.className = 'celebration-text';
      txt.textContent = '🎉';
      celebrationEl.appendChild(txt);
      const stars = ['⭐','🌟','✨','💫','🎊','🎶','🌈','❤️'];
      for (let i = 0; i < 18; i++) {
        const s = document.createElement('div');
        s.className = 'star-burst';
        s.textContent = stars[i % stars.length];
        const angle = (i / 18) * 360, dist = 130 + Math.random() * 90;
        s.style.setProperty('--tx', Math.round(Math.cos(angle * Math.PI / 180) * dist) + 'px');
        s.style.setProperty('--ty', Math.round(Math.sin(angle * Math.PI / 180) * dist) + 'px');
        s.style.left = '50%'; s.style.top = '50%';
        s.style.marginLeft = '-20px'; s.style.marginTop = '-20px';
        s.style.animationDelay = (Math.random() * 0.2) + 's';
        celebrationEl.appendChild(s);
      }
      playCelebration();
      setTimeout(() => { celebrationEl.classList.remove('show'); celebrationEl.innerHTML = ''; }, 2200);
    }
    document.querySelectorAll('#song-select button').forEach(btn => {
      btn.addEventListener('click', () => {
        currentSong = btn.dataset.song; noteIndex = 0;
        document.querySelectorAll('#song-select button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</body>
</html>
