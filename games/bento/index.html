<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>おべんとうをつくろう</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #fff8e1 0%, #ffe0b2 100%);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 16px 32px;
      font-family: "Hiragino Maru Gothic ProN", "Rounded Mplus 1c", sans-serif;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
      overflow-x: hidden;
    }

    #back-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(0,0,0,0.1); border: 2px solid rgba(0,0,0,0.15);
      color: #555; border-radius: 20px; padding: 7px 16px; font-size: 0.8rem;
      text-decoration: none; z-index: 10; touch-action: manipulation;
    }

    /* ステッププログレス */
    #progress {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .step-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(0,0,0,0.15);
      transition: background 0.3s, transform 0.3s;
    }
    .step-dot.done   { background: #ff7043; }
    .step-dot.active { background: #ff7043; transform: scale(1.4); }

    /* お弁当箱 */
    #bento-box {
      width: 100%; max-width: 380px;
      background: #f44336;
      border-radius: 20px;
      padding: 10px;
      box-shadow: 0 6px 0 #b71c1c, 0 8px 20px rgba(0,0,0,0.2);
      margin-bottom: 24px;
    }
    #bento-inner {
      background: #fff9c4;
      border-radius: 12px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 8px;
      min-height: 140px;
    }

    .bento-slot {
      background: rgba(255,255,255,0.6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      min-height: 60px;
      transition: all 0.3s;
      position: relative;
    }
    /* 主食は2列分 */
    .bento-slot.wide { grid-column: 1 / -1; font-size: 2.4rem; }

    .bento-slot.empty { opacity: 0.3; }
    .bento-slot .slot-label {
      position: absolute; bottom: 4px; right: 6px;
      font-size: 0.6rem; color: #999;
    }
    .bento-slot.filled { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn {
      0%   { transform: scale(0); }
      100% { transform: scale(1); }
    }

    /* 飲み物スロット（箱の外） */
    #drink-slot {
      align-self: flex-end;
      margin-top: -4px;
      background: rgba(255,255,255,0.6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      width: 60px; height: 60px;
      position: absolute;
      right: 10px; bottom: 10px;
      transition: all 0.3s;
    }

    /* 選択エリア */
    #select-area { width: 100%; max-width: 420px; }

    #category-title {
      font-size: 1.4rem; font-weight: bold; color: #e65100;
      text-align: center; margin-bottom: 16px;
    }

    #choices {
      display: flex; flex-direction: column; gap: 12px;
    }

    .choice-btn {
      background: #fff;
      border: 3px solid #ffe0b2;
      border-radius: 20px;
      padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 0 #ffe0b2;
      transition: transform 0.1s, box-shadow 0.1s;
      font-size: 1.1rem; color: #333; font-weight: bold;
      font-family: inherit;
    }
    .choice-btn:active {
      transform: translateY(3px); box-shadow: 0 1px 0 #ffe0b2;
    }
    .choice-btn .choice-icon { font-size: 2.4rem; line-height: 1; flex-shrink: 0; }
    .choice-btn .choice-desc { font-size: 0.8rem; color: #aaa; font-weight: normal; margin-top: 2px; }

    /* 完成画面 */
    #finish-screen {
      display: none;
      flex-direction: column; align-items: center; gap: 20px;
      width: 100%; max-width: 380px;
    }
    #finish-screen.show { display: flex; }
    #select-area.hidden { display: none; }

    #finish-title {
      font-size: 1.8rem; font-weight: bold; color: #e65100;
      text-align: center;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    #menu-list {
      background: rgba(255,255,255,0.7);
      border-radius: 16px;
      padding: 16px 20px;
      width: 100%;
      display: flex; flex-direction: column; gap: 10px;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .menu-row { display: flex; align-items: center; gap: 12px; font-size: 1rem; color: #555; }
    .menu-row .menu-icon { font-size: 1.8rem; }
    .menu-row .menu-cat  { font-size: 0.75rem; color: #aaa; }

    #restart-btn {
      background: #ff7043; color: #fff;
      border: none; border-radius: 50px;
      padding: 16px 40px; font-size: 1.2rem; font-weight: bold;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 5px 0 #bf360c;
      transition: transform 0.1s, box-shadow 0.1s;
      font-family: inherit;
    }
    #restart-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #bf360c; }

    /* お祝い */
    #celebration {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      z-index: 30; pointer-events: none;
    }
    #celebration.show { display: flex; }
    .star-burst { position: absolute; font-size: 2.4rem; animation: starFloat 1.6s ease-out forwards; }
    @keyframes starFloat {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
    }
  </style>
</head>
<body>

  <a id="back-btn" href="../../index.html">← もどる</a>

  <div id="progress"></div>

  <!-- お弁当箱 -->
  <div id="bento-box">
    <div id="bento-inner">
      <div class="bento-slot wide empty" id="slot-main"><span class="slot-label">しゅしょく</span></div>
      <div class="bento-slot empty"      id="slot-side1"><span class="slot-label">しゅさい</span></div>
      <div class="bento-slot empty"      id="slot-side2"><span class="slot-label">ふくさい</span></div>
    </div>
  </div>
  <!-- 飲み物（箱の外） -->
  <div style="position:relative;width:100%;max-width:380px;height:0;">
    <div id="slot-drink" class="bento-slot empty" style="position:absolute;right:0;top:-70px;width:60px;height:60px;font-size:2rem;background:rgba(255,255,255,0.8);border-radius:10px;z-index:5;">
      <span class="slot-label" style="position:absolute;bottom:2px;right:3px;font-size:0.55rem;color:#999;">のみもの</span>
    </div>
  </div>

  <!-- 選択エリア -->
  <div id="select-area">
    <div id="category-title"></div>
    <div id="choices"></div>
  </div>

  <!-- 完成画面 -->
  <div id="finish-screen">
    <div id="finish-title">🍱 できあがり！</div>
    <div id="menu-list"></div>
    <button id="restart-btn">もういちどつくる 🍱</button>
  </div>

  <div id="celebration"></div>

  <script src="../../shared/audio.js"></script>
  <script>
    const STEPS = [
      {
        category: '🍱 しゅしょくをえらぼう',
        slot: 'slot-main',
        choices: [
          { icon: '🍙', name: 'おにぎり',       desc: 'ぱりぱりのり' },
          { icon: '🍚', name: 'ふりかけごはん', desc: 'カラフルごはん' },
          { icon: '🍜', name: 'やきそば',       desc: 'もちもち麺' },
        ],
      },
      {
        category: '🍗 しゅさいをえらぼう',
        slot: 'slot-side1',
        choices: [
          { icon: '🍗', name: 'からあげ',     desc: 'じゅわっとジューシー' },
          { icon: '🥚', name: 'たまごやき',   desc: 'あまくてふわふわ' },
          { icon: '🍖', name: 'ハンバーグ',   desc: 'デミグラスソース' },
        ],
      },
      {
        category: '🥦 ふくさいをえらぼう',
        slot: 'slot-side2',
        choices: [
          { icon: '🥦', name: 'ブロッコリー', desc: 'もりもり元気' },
          { icon: '🍅', name: 'ミニトマト',   desc: 'あかくてかわいい' },
          { icon: '🌽', name: 'コーン',       desc: 'あまあまプチプチ' },
        ],
      },
      {
        category: '🧃 のみものをえらぼう',
        slot: 'slot-drink',
        choices: [
          { icon: '🍵', name: 'おちゃ',           desc: 'ほっとひとやすみ' },
          { icon: '🧃', name: 'オレンジジュース', desc: 'さわやかすっきり' },
          { icon: '🥛', name: 'ぎゅうにゅう',     desc: 'こくてまろやか' },
        ],
      },
    ];

    let stepIdx  = 0;
    let selected = [];

    // プログレスドット生成
    const progressEl = document.getElementById('progress');
    STEPS.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      dot.id = `dot-${i}`;
      progressEl.appendChild(dot);
    });

    function updateProgress() {
      STEPS.forEach((_, i) => {
        const dot = document.getElementById(`dot-${i}`);
        dot.className = 'step-dot' + (i < stepIdx ? ' done' : i === stepIdx ? ' active' : '');
      });
    }

    function renderStep() {
      updateProgress();
      const step = STEPS[stepIdx];
      document.getElementById('category-title').textContent = step.category;
      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';
      step.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-icon">${choice.icon}</span><div><div>${choice.name}</div><div class="choice-desc">${choice.desc}</div></div>`;
        const onTap = (e) => { e.preventDefault(); pick(choice); };
        btn.addEventListener('touchstart', onTap, { passive: false });
        btn.addEventListener('mousedown',  onTap);
        choicesEl.appendChild(btn);
      });
    }

    function pick(choice) {
      selected.push(choice);

      // スロットに配置
      const slot = document.getElementById(STEPS[stepIdx].slot);
      slot.innerHTML = choice.icon;
      slot.classList.remove('empty');
      slot.classList.add('filled');
      setTimeout(() => slot.classList.remove('filled'), 500);

      // 音
      const notes = [523.25, 587.33, 659.25, 698.46];
      playNote(notes[stepIdx], 0.25);

      stepIdx++;

      if (stepIdx >= STEPS.length) {
        showFinish();
      } else {
        renderStep();
      }
    }

    function showFinish() {
      document.getElementById('select-area').classList.add('hidden');
      updateProgress();

      setTimeout(() => {
        const finishEl = document.getElementById('finish-screen');
        finishEl.classList.add('show');

        const menuList = document.getElementById('menu-list');
        menuList.innerHTML = '';
        const cats = ['しゅしょく','しゅさい','ふくさい','のみもの'];
        selected.forEach((s, i) => {
          const row = document.createElement('div');
          row.className = 'menu-row';
          row.innerHTML = `<span class="menu-icon">${s.icon}</span><div><div>${s.name}</div><div class="menu-cat">${cats[i]}</div></div>`;
          menuList.appendChild(row);
        });

        showCelebration();
        playCelebration();
      }, 400);

      document.getElementById('restart-btn').addEventListener('click', restart);
    }

    function restart() {
      stepIdx  = 0;
      selected = [];

      // スロットリセット
      ['slot-main','slot-side1','slot-side2','slot-drink'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        el.classList.add('empty');
        el.classList.remove('filled');
        // ラベルを戻す
        const labels = { 'slot-main':'しゅしょく','slot-side1':'しゅさい','slot-side2':'ふくさい','slot-drink':'のみもの' };
        const lbl = document.createElement('span');
        lbl.className = 'slot-label';
        lbl.style.cssText = id === 'slot-drink' ? 'position:absolute;bottom:2px;right:3px;font-size:0.55rem;color:#999;' : '';
        lbl.textContent = labels[id];
        el.appendChild(lbl);
      });

      document.getElementById('finish-screen').classList.remove('show');
      document.getElementById('select-area').classList.remove('hidden');
      renderStep();
    }

    function showCelebration() {
      const celebEl = document.getElementById('celebration');
      celebEl.innerHTML = '';
      celebEl.classList.add('show');
      const stars = ['⭐','🌟','✨','💫','🎊','🍱','🌈','❤️'];
      for (let i = 0; i < 20; i++) {
        const s = document.createElement('div');
        s.className = 'star-burst';
        s.textContent = stars[i % stars.length];
        const angle = (i / 20) * 360, dist = 140 + Math.random() * 100;
        s.style.setProperty('--tx', Math.round(Math.cos(angle * Math.PI / 180) * dist) + 'px');
        s.style.setProperty('--ty', Math.round(Math.sin(angle * Math.PI / 180) * dist) + 'px');
        s.style.left = '50%'; s.style.top = '40%';
        s.style.marginLeft = '-20px'; s.style.marginTop = '-20px';
        s.style.animationDelay = (Math.random() * 0.3) + 's';
        celebEl.appendChild(s);
      }
      setTimeout(() => { celebEl.classList.remove('show'); celebEl.innerHTML = ''; }, 3000);
    }

    renderStep();
  </script>
</body>
</html>
