<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>おべんとうをつくろう</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #fffde7 0%, #fff3e0 100%);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 12px 28px;
      font-family: "Hiragino Maru Gothic ProN", "Rounded Mplus 1c", sans-serif;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }
    #back-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(0,0,0,0.08); border: 2px solid rgba(0,0,0,0.12);
      color: #555; border-radius: 20px; padding: 7px 14px; font-size: 0.78rem;
      text-decoration: none; z-index: 10;
    }

    /* ステップドット */
    #progress { display: flex; gap: 10px; margin-bottom: 16px; }
    .dot { width: 13px; height: 13px; border-radius: 50%; background: rgba(0,0,0,0.15); transition: all 0.3s; }
    .dot.done   { background: #e64a19; }
    .dot.active { background: #e64a19; transform: scale(1.5); }

    /* 弁当箱 */
    #bento-wrap { width: 100%; max-width: 400px; margin-bottom: 20px; }
    #bento-wrap svg { width: 100%; height: auto; }

    /* セル内コンテンツ */
    .cell-content {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    }
    .cell-content svg { width: 60%; height: 60%; }
    .cell-name { font-size: 0.68rem; color: #555; font-weight: bold; font-family: sans-serif; }

    /* 小セル用 */
    .cell-content.sm svg { width: 52%; height: 52%; }
    .cell-content.sm .cell-name { font-size: 0.6rem; }

    /* 選択エリア */
    #select-area { width: 100%; max-width: 420px; }
    #category-title {
      font-size: 1.3rem; font-weight: bold; color: #e64a19;
      text-align: center; margin-bottom: 12px;
    }
    #choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: #fff; border: 3px solid #ffe082; border-radius: 18px;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 0 #ffc107;
      transition: transform 0.1s, box-shadow 0.1s;
      font-family: inherit; text-align: left; width: 100%;
    }
    .choice-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #ffc107; }
    .choice-icon { width: 64px; height: 64px; flex-shrink: 0; }
    .choice-icon svg { width: 100%; height: 100%; }
    .choice-name { font-size: 1.1rem; font-weight: bold; color: #333; }
    .choice-desc { font-size: 0.78rem; color: #aaa; margin-top: 2px; }

    /* 完成画面 */
    #finish-screen {
      display: none; flex-direction: column; align-items: center; gap: 18px;
      width: 100%; max-width: 400px;
    }
    #finish-screen.show { display: flex; }
    #select-area.hidden { display: none; }
    #finish-title {
      font-size: 1.7rem; font-weight: bold; color: #e64a19;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
    #menu-list {
      background: rgba(255,255,255,0.85); border-radius: 16px;
      padding: 14px 18px; width: 100%;
      display: flex; flex-direction: column; gap: 10px;
    }
    .menu-row { display: flex; align-items: center; gap: 12px; }
    .menu-row .mr-icon { width: 48px; height: 48px; flex-shrink: 0; }
    .menu-row .mr-icon svg { width: 100%; height: 100%; }
    .menu-row .mr-name { font-size: 1rem; font-weight: bold; color: #333; }
    .menu-row .mr-cat  { font-size: 0.72rem; color: #aaa; }
    #restart-btn {
      background: #e64a19; color: #fff; border: none; border-radius: 50px;
      padding: 15px 36px; font-size: 1.15rem; font-weight: bold;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 5px 0 #bf360c; font-family: inherit;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #restart-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #bf360c; }

    /* お祝い */
    #celebration { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 30; pointer-events: none; }
    #celebration.show { display: flex; }
    .star-burst { position: absolute; font-size: 2.4rem; animation: sf 1.6s ease-out forwards; }
    @keyframes sf { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3)} }
  </style>
</head>

  },
];

let stepIdx = 0, selected = [];

// ドット生成
const progEl = document.getElementById('progress');
STEPS.forEach((_,i)=>{
  const d = document.createElement('div');
  d.className='dot'; d.id=`dot-${i}`;
  progEl.appendChild(d);
});

function updateDots(){
  STEPS.forEach((_,i)=>{
    const d = document.getElementById(`dot-${i}`);
    d.className='dot'+(i<stepIdx?' done':i===stepIdx?' active':'');
  });
}

function renderStep(){
  updateDots();
  const step = STEPS[stepIdx];
  document.getElementById('category-title').textContent = step.category;
  const ch = document.getElementById('choices');
  ch.innerHTML='';
  step.choices.forEach(c=>{
    const btn = document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`
      <span class="choice-icon">${ILLUST[c.key]}</span>
      <div>
        <div class="choice-name">${c.key}</div>
        <div class="choice-desc">${c.desc}</div>
      </div>`;
    const fn=e=>{e.preventDefault();pick(c);};
    btn.addEventListener('touchstart',fn,{passive:false});
    btn.addEventListener('mousedown',fn);
    ch.appendChild(btn);
  });
}

function pick(choice){
  selected.push(choice);
  const step = STEPS[stepIdx];
  const cell = document.getElementById(step.cellId);

  if(step.size==='drink'){
    cell.innerHTML=`${ILLUST[choice.key]}<span style="font-size:0.62rem;font-family:sans-serif;color:#555">${choice.key}</span>`;
    cell.style.opacity='1';
    cell.style.background='#fff9c4';
    cell.style.borderStyle='solid';
    cell.style.borderColor='#ffc107';
  } else {
    const cls = step.size==='sm'?'cell-content sm':'cell-content';
    cell.innerHTML=`<div class="${cls}">${ILLUST[choice.key]}<span class="cell-name">${choice.key}</span></div>`;
    cell.style.opacity='1';
  }

  // ポップアニメ
  cell.style.animation='none'; cell.offsetHeight;
  cell.style.animation='popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';

  const notes=[523.25,587.33,659.25,783.99];
  playNote(notes[stepIdx],0.25);
  stepIdx++;
  if(stepIdx>=STEPS.length) showFinish();
  else renderStep();
}

function showFinish(){
  document.getElementById('select-area').classList.add('hidden');
  updateDots();
  setTimeout(()=>{
    document.getElementById('finish-screen').classList.add('show');
    const ml=document.getElementById('menu-list');
    ml.innerHTML='';
    const cats=['しゅしょく','しゅさい','ふくさい','のみもの'];
    selected.forEach((s,i)=>{
      const r=document.createElement('div');
      r.className='menu-row';
      r.innerHTML=`<span class="mr-icon">${ILLUST[s.key]}</span>
        <div><div class="mr-name">${s.key}</div><div class="mr-cat">${cats[i]}</div></div>`;
      ml.appendChild(r);
    });
    showCelebration(); playCelebration();
  },300);
  document.getElementById('restart-btn').addEventListener('click',restart);
}

function restart(){
  stepIdx=0; selected=[];
  const resets=[
    ['cell-main',  'big',  '🍱','しゅしょく'],
    ['cell-side1', 'sm',   '🍽️','しゅさい'],
    ['cell-side2', 'sm',   '🥗','ふくさい'],
  ];
  resets.forEach(([id,sz,ic,lb])=>{
    const el=document.getElementById(id);
    el.style.animation='';
    el.innerHTML=`<svg viewBox="0 0 100 100"><text x="50" y="62" text-anchor="middle" font-size="52">${ic}</text></svg><span class="${sz==='sm'?'cell-name':'cell-name'}">${lb}</span>`;
    el.style.opacity='0.25';
  });
  const dr=document.getElementById('cell-drink');
  dr.innerHTML=`<span style="font-size:1.4rem">🧃</span><span style="font-family:sans-serif">のみもの</span>`;
  dr.style.background='#e3f2fd'; dr.style.borderStyle='dashed'; dr.style.borderColor='#90caf9'; dr.style.opacity='0.5';

  document.getElementById('finish-screen').classList.remove('show');
  document.getElementById('select-area').classList.remove('hidden');
  renderStep();
}

function showCelebration(){
  const el=document.getElementById('celebration');
  el.innerHTML=''; el.classList.add('show');
  const stars=['⭐','🌟','✨','💫','🎊','🍱','🌈','❤️'];
  for(let i=0;i<20;i++){
    const s=document.createElement('div');
    s.className='star-burst'; s.textContent=stars[i%stars.length];
    const a=(i/20)*360,d=140+Math.random()*100;
    s.style.setProperty('--tx',Math.round(Math.cos(a*Math.PI/180)*d)+'px');
    s.style.setProperty('--ty',Math.round(Math.sin(a*Math.PI/180)*d)+'px');
    s.style.left='50%'; s.style.top='40%';
    s.style.marginLeft='-20px'; s.style.marginTop='-20px';
    s.style.animationDelay=(Math.random()*0.3)+'s';
    el.appendChild(s);
  }
  setTimeout(()=>{el.classList.remove('show');el.innerHTML='';},3000);
}

renderStep();
</script>
</body>
</html>
