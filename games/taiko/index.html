<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>たいこあそび</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(160deg, #1a0a00 0%, #3a1200 60%, #1a0a00 100%);
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #back-btn {
      position: fixed;
      top: 16px; left: 16px;
      z-index: 20;
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 50%;
      width: 46px; height: 46px;
      font-size: 20px; cursor: pointer;
      color: white;
      display: flex; align-items: center; justify-content: center;
    }

    /* Title */
    #title {
      color: #FFD580;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 0.2em;
      margin-bottom: 24px;
      text-shadow: 0 0 20px rgba(255,180,50,0.5);
    }

    /* Drum stage */
    #drum-stage {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 28px;
      padding: 0 16px;
    }

    /* ── Drum component ── */
    .drum-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    /* Drum body (SVG-drawn) */
    .drum-svg {
      display: block;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6));
      transition: transform 0.06s;
      transform-origin: center bottom;
    }
    .drum-wrap:active .drum-svg,
    .drum-wrap.hit .drum-svg {
      transform: scaleY(0.88) scaleX(1.04);
    }

    /* Stand legs */
    .drum-stand {
      width: 60%;
      height: 18px;
      background: linear-gradient(180deg, #8B5E2A, #5A3A10);
      border-radius: 0 0 8px 8px;
      margin-top: -2px;
    }

    /* Hit ripple */
    .ripple {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255,220,100,0.5);
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      animation: rippleOut 0.5s ease-out forwards;
    }
    @keyframes rippleOut {
      to { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }

    /* Hit notes floating up */
    .hit-note {
      position: fixed;
      font-size: 28px;
      pointer-events: none;
      z-index: 50;
      animation: floatNote 0.9s ease-out forwards;
    }
    @keyframes floatNote {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-80px) scale(0.5); }
    }

    /* Bachi (drumstick) indicators */
    #bachi-hint {
      margin-top: 20px;
      color: rgba(255,200,100,0.5);
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<button id="back-btn" onclick="location.href='../../index.html'">←</button>

<div id="title">たいこ 🥁</div>

<div id="drum-stage">
  <!-- Left small drum -->
  <div class="drum-wrap" id="drum-ko" data-freq="220" data-type="ko">
    <svg class="drum-svg" width="130" height="110" viewBox="0 0 130 110">
      <!-- Body cylinder side -->
      <rect x="10" y="28" width="110" height="62" rx="6" fill="#C0392B"/>
      <rect x="10" y="28" width="110" height="62" rx="6" fill="url(#sideGrad)"/>
      <!-- Decorative band -->
      <rect x="10" y="50" width="110" height="18" fill="rgba(0,0,0,0.15)"/>
      <rect x="10" y="52" width="110" height="3"  fill="rgba(255,255,255,0.1)"/>
      <!-- Ropes (diagonal lines) -->
      <line x1="25" y1="28" x2="18" y2="90" stroke="#8B5E2A" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="28" x2="43" y2="90" stroke="#8B5E2A" stroke-width="3" stroke-linecap="round"/>
      <line x1="80" y1="28" x2="87" y2="90" stroke="#8B5E2A" stroke-width="3" stroke-linecap="round"/>
      <line x1="105" y1="28" x2="112" y2="90" stroke="#8B5E2A" stroke-width="3" stroke-linecap="round"/>
      <!-- Top head (ellipse) -->
      <ellipse cx="65" cy="28" rx="55" ry="14" fill="#F5DEB3"/>
      <ellipse cx="65" cy="28" rx="55" ry="14" fill="url(#headGrad)"/>
      <!-- Head rim -->
      <ellipse cx="65" cy="28" rx="55" ry="14" fill="none" stroke="#8B5E2A" stroke-width="4"/>
      <!-- Bottom head -->
      <ellipse cx="65" cy="90" rx="55" ry="14" fill="#D4C5A0"/>
      <ellipse cx="65" cy="90" rx="55" ry="14" fill="none" stroke="#8B5E2A" stroke-width="4"/>
      <defs>
        <linearGradient id="sideGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
        </linearGradient>
        <radialGradient id="headGrad" cx="40%" cy="40%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
        </radialGradient>
      </defs>
    </svg>
    <div class="drum-stand"></div>
  </div>

  <!-- Center big drum (おおだいこ) -->
  <div class="drum-wrap" id="drum-o" data-freq="80" data-type="o">
    <svg class="drum-svg" width="220" height="190" viewBox="0 0 220 190">
      <rect x="10" y="42" width="200" height="110" rx="8" fill="#C0392B"/>
      <rect x="10" y="42" width="200" height="110" rx="8" fill="url(#sideGrad2)"/>
      <!-- Band -->
      <rect x="10" y="80"  width="200" height="34" fill="rgba(0,0,0,0.15)"/>
      <rect x="10" y="83"  width="200" height="4"  fill="rgba(255,255,255,0.1)"/>
      <!-- Ropes -->
      <line x1="32"  y1="42" x2="22"  y2="152" stroke="#8B5E2A" stroke-width="4" stroke-linecap="round"/>
      <line x1="70"  y1="42" x2="60"  y2="152" stroke="#8B5E2A" stroke-width="4" stroke-linecap="round"/>
      <line x1="110" y1="42" x2="110" y2="152" stroke="#8B5E2A" stroke-width="4" stroke-linecap="round"/>
      <line x1="150" y1="42" x2="160" y2="152" stroke="#8B5E2A" stroke-width="4" stroke-linecap="round"/>
      <line x1="188" y1="42" x2="198" y2="152" stroke="#8B5E2A" stroke-width="4" stroke-linecap="round"/>
      <!-- Top head -->
      <ellipse cx="110" cy="42"  rx="100" ry="24" fill="#F5DEB3"/>
      <ellipse cx="110" cy="42"  rx="100" ry="24" fill="url(#headGrad2)"/>
      <ellipse cx="110" cy="42"  rx="100" ry="24" fill="none" stroke="#8B5E2A" stroke-width="5"/>
      <!-- Circle mark on head -->
      <circle  cx="110" cy="42"  r="30" fill="rgba(180,30,30,0.4)" stroke="rgba(160,20,20,0.6)" stroke-width="2"/>
      <!-- Bottom head -->
      <ellipse cx="110" cy="152" rx="100" ry="24" fill="#D4C5A0"/>
      <ellipse cx="110" cy="152" rx="100" ry="24" fill="none" stroke="#8B5E2A" stroke-width="5"/>
      <defs>
        <linearGradient id="sideGrad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
        </linearGradient>
        <radialGradient id="headGrad2" cx="40%" cy="40%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
        </radialGradient>
      </defs>
    </svg>
    <div class="drum-stand" style="width:50%;height:24px;"></div>
  </div>

  <!-- Right small drum -->
  <div class="drum-wrap" id="drum-ko2" data-freq="330" data-type="ko">
    <svg class="drum-svg" width="130" height="110" viewBox="0 0 130 110">
      <rect x="10" y="28" width="110" height="62" rx="6" fill="#C0392B"/>
      <rect x="10" y="28" width="110" height="62" rx="6" fill="url(#sideGrad3)"/>
      <rect x="10" y="50" width="110" height="18" fill="rgba(0,0,0,0.15)"/>
      <line x1="25"  y1="28" x2="18"  y2="90" stroke="#8B5E2A" stroke-width="3" stroke-linecap="round"/>
      <line x1="50"  y1="28" x2="43"  y2="90" stroke="#8B5E2A" stroke-width="3" stroke-linecap="round"/>
      <line x1="80"  y1="28" x2="87"  y2="90" stroke="#8B5E2A" stroke-width="3" stroke-linecap="round"/>
      <line x1="105" y1="28" x2="112" y2="90" stroke="#8B5E2A" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="65" cy="28" rx="55" ry="14" fill="#F5DEB3"/>
      <ellipse cx="65" cy="28" rx="55" ry="14" fill="url(#headGrad3)"/>
      <ellipse cx="65" cy="28" rx="55" ry="14" fill="none" stroke="#8B5E2A" stroke-width="4"/>
      <ellipse cx="65" cy="90" rx="55" ry="14" fill="#D4C5A0"/>
      <ellipse cx="65" cy="90" rx="55" ry="14" fill="none" stroke="#8B5E2A" stroke-width="4"/>
      <defs>
        <linearGradient id="sideGrad3" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
        </linearGradient>
        <radialGradient id="headGrad3" cx="40%" cy="40%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
        </radialGradient>
      </defs>
    </svg>
    <div class="drum-stand"></div>
  </div>
</div>

<div id="bachi-hint">たたいてみよう！</div>

<script>
// ── Taiko sound synthesis ──────────────────────────────────
let _ctx = null;
function getAudio() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}

function hitTaiko(baseFreq, type) {
  const ctx = getAudio();
  const now = ctx.currentTime;

  if (type === 'o') {
    // おおだいこ: deep boom
    // Layer 1: tonal body (low sine, pitch drops fast)
    const osc1 = ctx.createOscillator();
    const g1   = ctx.createGain();
    osc1.connect(g1); g1.connect(ctx.destination);
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(baseFreq * 1.8, now);
    osc1.frequency.exponentialRampToValueAtTime(baseFreq * 0.6, now + 0.12);
    g1.gain.setValueAtTime(0.9, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
    osc1.start(now); osc1.stop(now + 0.9);

    // Layer 2: mid thump
    const osc2 = ctx.createOscillator();
    const g2   = ctx.createGain();
    osc2.connect(g2); g2.connect(ctx.destination);
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(baseFreq * 3, now);
    osc2.frequency.exponentialRampToValueAtTime(baseFreq, now + 0.08);
    g2.gain.setValueAtTime(0.5, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc2.start(now); osc2.stop(now + 0.35);

    // Layer 3: noise transient (attack crack)
    const bufSize = ctx.sampleRate * 0.08;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const gn = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 180;
    filter.Q.value = 0.8;
    noise.connect(filter); filter.connect(gn); gn.connect(ctx.destination);
    gn.gain.setValueAtTime(0.7, now);
    gn.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    noise.start(now); noise.stop(now + 0.08);

  } else {
    // こだいこ: snappy higher-pitched hit
    const osc1 = ctx.createOscillator();
    const g1   = ctx.createGain();
    osc1.connect(g1); g1.connect(ctx.destination);
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(baseFreq * 2, now);
    osc1.frequency.exponentialRampToValueAtTime(baseFreq * 0.8, now + 0.07);
    g1.gain.setValueAtTime(0.7, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
    osc1.start(now); osc1.stop(now + 0.45);

    // Noise crack
    const bufSize = ctx.sampleRate * 0.05;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const gn = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 400;
    filter.Q.value = 1.2;
    noise.connect(filter); filter.connect(gn); gn.connect(ctx.destination);
    gn.gain.setValueAtTime(0.5, now);
    gn.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    noise.start(now); noise.stop(now + 0.05);
  }
}

// ── Hit handler ───────────────────────────────────────────
const NOTES = ['ドン！','ドン','ドコ','ドン！','ドン'];

function handleHit(drumEl) {
  const freq = parseFloat(drumEl.dataset.freq);
  const type = drumEl.dataset.type;

  hitTaiko(freq, type);

  // Bounce animation
  drumEl.classList.add('hit');
  setTimeout(() => drumEl.classList.remove('hit'), 120);

  // Ripple
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  drumEl.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);

  // Floating note text
  const rect = drumEl.getBoundingClientRect();
  const note = document.createElement('div');
  note.className = 'hit-note';
  note.textContent = NOTES[Math.floor(Math.random() * NOTES.length)];
  note.style.left = (rect.left + rect.width / 2 - 20) + 'px';
  note.style.top  = (rect.top + 20) + 'px';
  note.style.color = type === 'o' ? '#FFD580' : '#FF9898';
  document.body.appendChild(note);
  setTimeout(() => note.remove(), 900);
}

// Attach events to all drums
document.querySelectorAll('.drum-wrap').forEach(drum => {
  drum.addEventListener('pointerdown', e => {
    e.preventDefault();
    handleHit(drum);
  });
});
</script>
</body>
</html>
