<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>たいこあそび</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
    html, body { touch-action: manipulation; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: radial-gradient(ellipse at center, #2a0e00 0%, #0d0500 100%);
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #back-btn {
      position: fixed;
      top: 16px; left: 16px; z-index: 30;
      background: rgba(255,255,255,0.12);
      border: none; border-radius: 50%;
      width: 46px; height: 46px;
      font-size: 20px; cursor: pointer; color: white;
      display: flex; align-items: center; justify-content: center;
    }

    #title {
      color: #FFD580;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.2em;
      margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(255,180,50,0.5);
    }

    #drum-stage {
      display: grid;
      grid-template-columns: repeat(3, auto);
      grid-template-rows: auto auto;
      gap: 8px 16px;
      align-items: end;
      justify-items: center;
    }

    .drum-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .drum-svg {
      display: block;
      transition: transform 0.06s;
      transform-origin: center 70%;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.7));
    }
    .drum-wrap.hit .drum-svg { transform: scaleY(0.87) scaleX(1.05); }

    .drum-stand {
      background: linear-gradient(180deg, #7A5020, #3A2008);
      border-radius: 0 0 6px 6px;
      margin-top: -1px;
      width: 50%; height: 14px;
    }

    /* ── Bachi at bottom-right ── */
    .bachi-wrap {
      position: absolute;
      bottom: 14px;
      right: -10px;
      z-index: 10;
      pointer-events: none;
      transform-origin: 50% 92%;   /* pivot at handle end */
      transform: rotate(38deg);    /* tip points upper-left toward drum */
      transition: transform 0.1s cubic-bezier(0.22,1,0.36,1);
    }
    .drum-wrap.hit .bachi-wrap {
      transform: rotate(18deg);    /* swings toward drum on hit */
      transition: transform 0.045s ease-out;
    }

    /* ── Cymbal ── */
    .cymbal-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cymbal-svg {
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
    }
    @keyframes cymbalWobble {
      0%  { transform: rotate(0deg) scaleX(1); }
      20% { transform: rotate(-3deg) scaleX(0.95); }
      55% { transform: rotate(2deg) scaleX(1.03); }
      80% { transform: rotate(-1deg); }
      100%{ transform: rotate(0deg) scaleX(1); }
    }
    .cymbal-wrap.hit .cymbal-svg { animation: cymbalWobble 0.55s ease-out; }
    .cymbal-stand-post { width: 6px; height: 22px; background: linear-gradient(#AAA,#666); border-radius: 3px; margin-top: -2px; }
    .cymbal-base { width: 26px; height: 9px; background: linear-gradient(#888,#444); border-radius: 4px; }
    .cymbal-wrap .bachi-wrap { bottom: 22px; }

    /* ── Ripple ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,220,100,0.4);
      transform: scale(0);
      pointer-events: none;
      animation: rippleOut 0.5s ease-out forwards;
      top: 35%; left: 50%;
      width: 16px; height: 16px;
      margin-left: -8px; margin-top: -8px;
    }
    @keyframes rippleOut { to { transform: scale(10); opacity: 0; } }
    .cymbal-wrap .ripple { top: 50%; }

    /* ── Floating text ── */
    .hit-note {
      position: fixed;
      font-size: 24px;
      font-weight: bold;
      pointer-events: none;
      z-index: 50;
      animation: floatNote 0.85s ease-out forwards;
    }
    @keyframes floatNote {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-70px) scale(0.4); }
    }
  </style>
</head>

<script>
// ── iOS Safari double-tap zoom fix ────────────────────────
// touch-action:manipulation alone is not enough on Safari;
// preventDefault on touchstart is required.
document.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
document.addEventListener('touchend',   e => e.preventDefault(), { passive: false });

// ── Audio ─────────────────────────────────────────────────
let _ctx = null;
function getAudio() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}

function hitSound(baseFreq, type) {
  const ctx = getAudio();
  const now = ctx.currentTime;

  if (type === 'o') {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(baseFreq * 2.2, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.55, now + 0.14);
    g.gain.setValueAtTime(1.0, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
    osc.start(now); osc.stop(now + 1.1);
    const osc2 = ctx.createOscillator(), g2 = ctx.createGain();
    osc2.connect(g2); g2.connect(ctx.destination);
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(baseFreq * 4, now);
    osc2.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + 0.1);
    g2.gain.setValueAtTime(0.45, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc2.start(now); osc2.stop(now + 0.4);
    _noise(ctx, now, 200, 0.65, 0.09);

  } else if (type === 'chu') {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(baseFreq * 2.5, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.7, now + 0.1);
    g.gain.setValueAtTime(0.8, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
    osc.start(now); osc.stop(now + 0.7);
    _noise(ctx, now, 320, 0.5, 0.065);

  } else if (type === 'ko') {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(baseFreq * 3, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.9, now + 0.07);
    g.gain.setValueAtTime(0.65, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
    osc.start(now); osc.stop(now + 0.45);
    _noise(ctx, now, 500, 0.45, 0.05);

  } else if (type === 'cymbal') {
    const size = Math.floor(ctx.sampleRate * 0.8);
    const buf = ctx.createBuffer(1, size, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 5000;
    const g = ctx.createGain();
    src.connect(hp); hp.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.5, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    src.start(now); src.stop(now + 0.8);
    const osc = ctx.createOscillator(), g2 = ctx.createGain();
    osc.connect(g2); g2.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 3200;
    g2.gain.setValueAtTime(0.28, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    osc.start(now); osc.stop(now + 0.6);
  }
}

function _noise(ctx, now, freq, vol, dur) {
  const size = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, size, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = 0.9;
  const g = ctx.createGain();
  src.connect(bp); bp.connect(g); g.connect(ctx.destination);
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  src.start(now); src.stop(now + dur);
}

// ── Hit handler ───────────────────────────────────────────
const LABELS = { o: ['ドン！','ドーン','ドン'], chu: ['ドン','ドコ','ドン'], ko: ['コン','ドコ','コン'], cymbal: ['チャン！','シャン','チャーン'] };
const COLORS  = { o: '#FFD580', chu: '#88FFB0', ko: '#FF9898', cymbal: '#FFE860' };

function doHit(el, type, freq) {
  hitSound(freq, type);
  el.classList.add('hit');
  setTimeout(() => el.classList.remove('hit'), type === 'cymbal' ? 550 : 130);
  const rip = document.createElement('div');
  rip.className = 'ripple';
  el.appendChild(rip);
  setTimeout(() => rip.remove(), 520);
  const rect = el.getBoundingClientRect();
  const note = document.createElement('div');
  note.className = 'hit-note';
  const arr = LABELS[type] || ['ドン'];
  note.textContent = arr[Math.floor(Math.random() * arr.length)];
  note.style.left  = (rect.left + rect.width / 2 - 24) + 'px';
  note.style.top   = (rect.top + 16) + 'px';
  note.style.color = COLORS[type] || '#FFD580';
  document.body.appendChild(note);
  setTimeout(() => note.remove(), 880);
}

document.querySelectorAll('.drum-wrap').forEach(el => {
  el.addEventListener('pointerdown', e => { e.preventDefault(); doHit(el, el.dataset.type, parseFloat(el.dataset.freq)); });
});
document.querySelectorAll('.cymbal-wrap').forEach(el => {
  el.addEventListener('pointerdown', e => { e.preventDefault(); doHit(el, 'cymbal', 0); });
});
</script>
