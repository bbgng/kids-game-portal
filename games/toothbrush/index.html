<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>はみがきタイマー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d47a1;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      padding: 60px 16px 32px;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
      font-family: "Hiragino Maru Gothic ProN", "Rounded Mplus 1c", sans-serif;
    }

    #back-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
      color: #fff; border-radius: 20px; padding: 7px 16px; font-size: 0.8rem;
      text-decoration: none; z-index: 10; touch-action: manipulation;
    }

    /* セクション表示 */
    #section-display {
      display: flex; gap: 10px; align-items: center; justify-content: center;
    }
    .section-indicator {
      width: 52px; height: 52px;
      border-radius: 14px;
      border: 3px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: rgba(255,255,255,0.5);
      flex-direction: column; gap: 2px;
      transition: all 0.3s;
    }
    .section-indicator .si-icon { font-size: 1.4rem; }
    .section-indicator.active {
      border-color: #fff;
      background: rgba(255,255,255,0.2);
      color: #fff;
      transform: scale(1.15);
    }
    .section-indicator.done {
      background: rgba(100,255,150,0.25);
      border-color: #69f0ae;
      color: #69f0ae;
    }

    /* メインエリア */
    #main-area {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px;
    }

    /* 歯キャラクター */
    #tooth-wrap {
      position: relative;
      width: 160px; height: 180px;
    }
    #tooth-svg { width: 160px; height: 160px; }

    /* 歯ブラシアニメ */
    #brush {
      position: absolute;
      font-size: 3rem;
      bottom: 0; right: -20px;
      transform-origin: bottom center;
      animation: none;
    }
    #brush.brushing {
      animation: brushMove 0.5s ease-in-out infinite alternate;
    }
    @keyframes brushMove {
      0%   { transform: rotate(-20deg) translateY(0); }
      100% { transform: rotate(20deg) translateY(-10px); }
    }

    /* 大きな指示テキスト */
    #instruction {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 3px 8px rgba(0,0,0,0.3);
      text-align: center;
      min-height: 2.5rem;
    }

    /* タイマーリング */
    #timer-wrap {
      position: relative;
      width: 140px; height: 140px;
    }
    #timer-svg { width: 140px; height: 140px; transform: rotate(-90deg); }
    #timer-ring-bg { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 10; }
    #timer-ring    { fill: none; stroke: #69f0ae; stroke-width: 10; stroke-linecap: round;
                     stroke-dasharray: 345; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
    #timer-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: bold; color: #fff;
    }

    /* スタートボタン */
    #start-btn {
      background: #fff;
      color: #0d47a1;
      border: none; border-radius: 50px;
      padding: 18px 48px;
      font-size: 1.4rem; font-weight: bold;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 6px 0 rgba(0,0,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
    #start-btn.hidden { display: none; }

    /* お祝いオーバーレイ */
    #celebration {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 30; pointer-events: none;
      background: rgba(0,0,0,0.4);
    }
    #celebration.show { display: flex; }
    .celebration-text { font-size: 5rem; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    .celebration-msg  { font-size: 1.8rem; font-weight: bold; color: #fff; animation: popIn 0.4s 0.2s both; }
    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .star-burst { position: absolute; font-size: 2.4rem; animation: starFloat 1.6s ease-out forwards; }
    @keyframes starFloat {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
    }
  </style>
</head>
<body>

  <a id="back-btn" href="../../index.html">← もどる</a>

  <!-- セクション表示 -->
  <div id="section-display">
    <div class="section-indicator" id="si-0"><span class="si-icon">↖️</span><span>うえ左</span></div>
    <div class="section-indicator" id="si-1"><span class="si-icon">↗️</span><span>うえ右</span></div>
    <div class="section-indicator" id="si-2"><span class="si-icon">↙️</span><span>した左</span></div>
    <div class="section-indicator" id="si-3"><span class="si-icon">↘️</span><span>した右</span></div>
  </div>

  <!-- メインエリア -->
  <div id="main-area">
    <div id="tooth-wrap">
      <!-- 歯のSVGキャラ -->
      <svg id="tooth-svg" viewBox="0 0 100 110">
        <!-- 歯の形 -->
        <path d="M15,10 Q10,5 20,3 Q35,0 50,5 Q65,0 80,3 Q90,5 85,10
                 L82,50 Q80,70 75,85 Q70,100 65,105 Q60,110 55,100
                 L52,80 Q51,70 50,70 Q49,70 48,80 L45,100 Q40,110 35,105
                 Q30,100 25,85 Q20,70 18,50 Z"
              fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
        <!-- 目 -->
        <circle cx="37" cy="38" r="5" fill="#333"/>
        <circle cx="63" cy="38" r="5" fill="#333"/>
        <circle cx="39" cy="36" r="2" fill="#fff"/>
        <circle cx="65" cy="36" r="2" fill="#fff"/>
        <!-- 口（ニコニコ） -->
        <path id="tooth-mouth" d="M38,58 Q50,68 62,58" stroke="#f48fb1" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- ほっぺ -->
        <ellipse cx="28" cy="50" rx="7" ry="5" fill="#ffcdd2" opacity="0.6"/>
        <ellipse cx="72" cy="50" rx="7" ry="5" fill="#ffcdd2" opacity="0.6"/>
      </svg>
      <!-- 歯ブラシ -->
      <div id="brush">🪥</div>
    </div>

    <div id="instruction">スタートボタンをおして！</div>

    <div id="timer-wrap">
      <svg id="timer-svg" viewBox="0 0 120 120">
        <circle id="timer-ring-bg" cx="60" cy="60" r="55"/>
        <circle id="timer-ring"    cx="60" cy="60" r="55"/>
      </svg>
      <div id="timer-text">2:00</div>
    </div>
  </div>

  <button id="start-btn">はじめる 🦷</button>

  <div id="celebration"></div>

  <script src="../../shared/audio.js"></script>
  <script>
    const TOTAL      = 120; // 秒
    const SECTIONS   = [
      { label: 'うえ左をみがこう！', emoji: '↖️' },
      { label: 'うえ右をみがこう！', emoji: '↗️' },
      { label: 'した左をみがこう！', emoji: '↙️' },
      { label: 'した右をみがこう！', emoji: '↘️' },
    ];
    const SEC_DURATION = TOTAL / SECTIONS.length; // 30秒

    const RING_CIRC  = 2 * Math.PI * 55; // ≈ 345.6

    let timer     = null;
    let elapsed   = 0;
    let running   = false;

    const startBtn     = document.getElementById('start-btn');
    const instruction  = document.getElementById('instruction');
    const timerText    = document.getElementById('timer-text');
    const timerRing    = document.getElementById('timer-ring');
    const brush        = document.getElementById('brush');
    const celebEl      = document.getElementById('celebration');

    timerRing.style.strokeDasharray  = RING_CIRC;
    timerRing.style.strokeDashoffset = 0;

    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(1,'0');
      const s = (sec % 60).toString().padStart(2,'0');
      return `${m}:${s}`;
    }

    function updateUI() {
      const remaining = TOTAL - elapsed;
      timerText.textContent = formatTime(remaining);

      // リング: elapsed/TOTAL の割合でoffset
      timerRing.style.strokeDashoffset = RING_CIRC * (elapsed / TOTAL);

      // セクション
      const secIdx = Math.min(Math.floor(elapsed / SEC_DURATION), SECTIONS.length - 1);
      SECTIONS.forEach((_, i) => {
        const el = document.getElementById(`si-${i}`);
        if (i < secIdx)       { el.className = 'section-indicator done'; }
        else if (i === secIdx){ el.className = 'section-indicator active'; }
        else                  { el.className = 'section-indicator'; }
      });
      instruction.textContent = SECTIONS[secIdx].label;

      // リングの色をセクションで変える
      const colors = ['#69f0ae','#40c4ff','#ffd740','#ff6e40'];
      timerRing.style.stroke = colors[secIdx];
    }

    function tick() {
      elapsed++;
      updateUI();

      // セクション切り替え時にビープ
      if (elapsed % SEC_DURATION === 0 && elapsed < TOTAL) {
        playNote(880, 0.3);
        setTimeout(() => playNote(1046.50, 0.3), 200);
      }

      if (elapsed >= TOTAL) {
        clearInterval(timer);
        running = false;
        brush.classList.remove('brushing');
        instruction.textContent = 'よくできました！🦷✨';
        startBtn.textContent = 'もういちど 🦷';
        startBtn.classList.remove('hidden');
        elapsed = 0;
        showCelebration();
        timerRing.style.strokeDashoffset = 0;
        updateSectionDone();
      }
    }

    function updateSectionDone() {
      SECTIONS.forEach((_, i) => {
        document.getElementById(`si-${i}`).className = 'section-indicator done';
      });
    }

    startBtn.addEventListener('click', startTimer);
    startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startTimer(); }, { passive: false });

    function startTimer() {
      if (running) return;
      elapsed = 0;
      running = true;
      startBtn.classList.add('hidden');
      brush.classList.add('brushing');
      updateUI();
      timer = setInterval(tick, 1000);
      // スタート音
      playNote(523.25, 0.2);
      setTimeout(() => playNote(659.25, 0.2), 150);
    }

    function showCelebration() {
      celebEl.innerHTML = '';
      celebEl.classList.add('show');
      const txt = document.createElement('div');
      txt.className = 'celebration-text';
      txt.textContent = '🦷';
      celebEl.appendChild(txt);
      const msg = document.createElement('div');
      msg.className = 'celebration-msg';
      msg.textContent = 'ぴかぴかだ！';
      celebEl.appendChild(msg);
      const stars = ['⭐','✨','💫','🌟','🎊','🎶','🌈','❤️'];
      for (let i = 0; i < 20; i++) {
        const s = document.createElement('div');
        s.className = 'star-burst';
        s.textContent = stars[i % stars.length];
        const angle = (i / 20) * 360, dist = 140 + Math.random() * 100;
        s.style.setProperty('--tx', Math.round(Math.cos(angle * Math.PI / 180) * dist) + 'px');
        s.style.setProperty('--ty', Math.round(Math.sin(angle * Math.PI / 180) * dist) + 'px');
        s.style.left = '50%'; s.style.top = '40%';
        s.style.marginLeft = '-20px'; s.style.marginTop = '-20px';
        s.style.animationDelay = (Math.random() * 0.3) + 's';
        celebEl.appendChild(s);
      }
      playCelebration();
      setTimeout(() => { celebEl.classList.remove('show'); celebEl.innerHTML = ''; }, 3000);
    }
  </script>
</body>
</html>
